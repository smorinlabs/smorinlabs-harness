description = "Concrete-anchored explanation shorthand — /explain answers in a fixed anatomy: what it is, just-enough context, a real before/after example, and the payoff — with options/deeper/steps modes inferred from the target, and follow-up aware: a bare explain after an explanation diagnoses what's blocking action (step back to the bigger picture, clearer language, sharper example) and rewrites rather than repeats."
author = "Steve Morin"
