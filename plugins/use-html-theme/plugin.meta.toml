name = "use-html-theme"
version = "0.1.0"
description = "On any HTML-generation request, offer a small catalog of visual themes (Birchline warm-editorial, Technical-minimal docs-site, High-contrast-dark dashboard), apply the chosen theme to all subsequent HTML in the session, and optionally persist it per-project. Overrides via natural language, [theme: x] inline flags, and the /theme and /theme-preview slash commands. Fully-isolated themes with progressive disclosure — only the chosen theme's tokens are read."
author = "Steve Morin"
keywords = ["html", "css", "theme", "design", "artifacts", "birchline"]
