<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <title>use-html-theme — catalog preview</title>
  <style>
    html, body { margin: 0; background: #18181B; color: #FAFAFA; font-family: system-ui, sans-serif; }
    main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    h1 { font-size: 28px; font-weight: 600; margin: 0 0 8px; }
    .lead { color: #A3A3A3; margin: 0 0 32px; font-size: 14px; }
    .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }
    .frame { border-radius: 12px; overflow: hidden; border: 1px solid #2A2A2A; background: #0A0A0A; }
    .frame-head { padding: 10px 16px; background: #141414; border-bottom: 1px solid #2A2A2A; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #A3A3A3; display: flex; justify-content: space-between; }
    .frame-body { padding: 0; }
    iframe { border: 0; width: 100%; height: 420px; display: block; background: #FFFFFF; }
    iframe.dark { background: #0A0A0A; }
    .pick { font-family: ui-monospace, "SF Mono", monospace; color: #FAFAFA; }
  </style>
</head>
<body>
  <main>
    <h1>use-html-theme · catalog preview</h1>
    <p class="lead">Three themes side by side. Pick one with <span class="pick">[theme: &lt;name&gt;]</span>, ask to switch, or use the picker on your next HTML request.</p>
    <div class="row">

      <div class="frame">
        <div class="frame-head"><span>birchline</span><span class="pick">[theme: birchline]</span></div>
        <iframe srcdoc='<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="color-scheme" content="light"><style>:root{color-scheme:light;--clay:#D97757;--slate:#141413;--ivory:#FAF9F5;--oat:#E3DACC;--gray-100:#F0EEE6;--gray-700:#3D3D3A;--font-serif:Georgia,"Source Serif 4",serif;--font-sans:-apple-system,Inter,sans-serif;}html,body{margin:0;background:var(--ivory);color:var(--slate);font-family:var(--font-sans);font-weight:430;}main{padding:32px;}h1{font-family:var(--font-serif);font-weight:500;font-size:30px;margin:0 0 12px;}.accent{font-style:italic;color:var(--clay);}p{color:#3F3F3F;font-size:15px;line-height:1.55;margin:0 0 16px;}.btn{display:inline-flex;padding:8px 16px;background:var(--clay);color:white;border:0;border-radius:8px;font-weight:500;cursor:pointer;}.badge{display:inline-block;padding:2px 10px;background:var(--gray-100);color:var(--gray-700);border-radius:999px;font-size:12px;font-weight:500;}</style></head><body><main><h1>The unreasonable <span class="accent">effectiveness</span> of HTML</h1><p>Warm editorial register. Single coral accent. Serif hero, sans body. One handcrafted detail per page.</p><button class="btn">Read on</button> <span class="badge">v1.2.0</span></main></body></html>'></iframe>
      </div>

      <div class="frame">
        <div class="frame-head"><span>technical-minimal</span><span class="pick">[theme: minimal]</span></div>
        <iframe srcdoc='<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="color-scheme" content="light"><style>:root{color-scheme:light;--surface:#FFFFFF;--ink:#18181B;--ink-muted:#71717A;--accent:#2563EB;--border:#E4E4E7;--font-sans:-apple-system,"SF Pro Text",Inter,sans-serif;}html,body{margin:0;background:var(--surface);color:var(--ink);font-family:var(--font-sans);}main{padding:32px;}h1{font-size:30px;font-weight:600;margin:0 0 12px;}p{color:var(--ink-muted);font-size:15px;line-height:1.5;margin:0 0 16px;}.btn{padding:8px 16px;background:var(--accent);color:white;border:0;border-radius:6px;font-weight:500;font-size:13px;cursor:pointer;}.badge{display:inline-block;padding:2px 8px;background:#EFF6FF;color:var(--accent);border:1px solid #DBEAFE;border-radius:4px;font-size:12px;font-weight:500;}</style></head><body><main><h1>api-gateway service status</h1><p>Engineering docs register. Neutral grays. Single blue accent. System sans. Tighter spacing than editorial themes.</p><button class="btn">Deploy</button> <span class="badge">Healthy</span></main></body></html>'></iframe>
      </div>

      <div class="frame">
        <div class="frame-head"><span>high-contrast-dark</span><span class="pick">[theme: dark]</span></div>
        <iframe class="dark" srcdoc='<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="color-scheme" content="dark"><style>:root{color-scheme:dark;--surface:#0A0A0A;--surface-2:#141414;--ink:#FAFAFA;--ink-strong:#FFFFFF;--ink-muted:#A3A3A3;--accent:#3B82F6;--success:#22C55E;--border:#2A2A2A;--font-sans:system-ui,-apple-system,sans-serif;--font-mono:"JetBrains Mono",monospace;}html,body{margin:0;background:var(--surface);color:var(--ink);font-family:var(--font-sans);}main{padding:32px;}h1{font-size:28px;font-weight:600;color:var(--ink-strong);margin:0 0 12px;}p{color:var(--ink-muted);font-size:14px;line-height:1.5;margin:0 0 16px;}.btn{padding:8px 16px;background:var(--accent);color:var(--surface);border:0;border-radius:5px;font-weight:500;font-size:13px;cursor:pointer;}.badge{display:inline-block;padding:2px 8px;background:#052E16;color:var(--success);border:1px solid #14532D;border-radius:3px;font-size:12px;font-weight:500;}</style></head><body><main><h1>prod cluster — live</h1><p>Near-black surface. Off-white text. Single saturated accent. Dashboards and dev tools. Subtle 1px borders separate layers, not glow.</p><button class="btn">Run</button> <span class="badge">Up</span></main></body></html>'></iframe>
      </div>

    </div>
  </main>
</body>
</html>
